<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AXIOMARA v3 — N = g(ID, Ts)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #03060a; --surface: #070f18; --surface2: #0a1520; --border: #0d2035;
            --border2: #1a3a55; --cyan: #00d4ff; --green: #00ff9d; --orange: #ff6b35;
            --gold: #ffd700; --text: #b8ccd8; --dim: #3a5468; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }
        /* Grid Overlay & Scanline */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),
                              linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 0;
        }
        @keyframes scan { to { top: 100%; } }
        body::after {
            content: ''; position: fixed; top: -2px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,transparent,var(--cyan),transparent);
            animation: scan 8s linear infinite; pointer-events: none; z-index: 1; opacity: .3;
        }

        /* Header & Logo */
        header { padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: relative; z-index: 10; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 900; letter-spacing: .3em; color: var(--cyan); text-shadow: 0 0 20px rgba(0,212,255,.4); }
        .logo em { color: var(--green); font-style: normal; }
        .vbadge { font-size: .65rem; color: var(--green); border: 1px solid var(--green); padding: .2rem .6rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s ease infinite; }
        @keyframes pulse { 50% { opacity: .3; transform: scale(.7); } }

        /* Layout Components */
        .hero { text-align: center; padding: 3rem 2rem; animation: fadeUp 1s ease forwards; position: relative; z-index: 10; }
        .eq { font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; color: var(--white); margin-bottom: 1rem; }
        .eq .n { color: var(--cyan); } .eq .g { color: var(--green); } .eq .ts { color: var(--gold); }
        
        .tabs { display: flex; max-width: 800px; margin: 0 auto; gap: 5px; padding: 0 2rem; position: relative; z-index: 10; }
        .tab { flex: 1; padding: .8rem; background: var(--surface); border: 1px solid var(--border); color: var(--dim); cursor: pointer; transition: 0.3s; text-align: center; font-size: 0.85rem; }
        .tab.active { background: rgba(0,212,255,0.05); border-color: var(--cyan); color: var(--cyan); }

        .main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 2rem; position: relative; z-index: 10; }
        .panel { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; animation: fadeUp .6s ease forwards; opacity: 0; }
        .plbl { font-family: 'Cinzel', serif; font-size: .65rem; color: var(--cyan); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
        .plbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* Forms & Interactive */
        .uz { border: 1px dashed var(--border2); padding: 2rem; text-align: center; cursor: pointer; transition: .3s; }
        .uz:hover, .uz.drag { border-color: var(--cyan); background: rgba(0,212,255,0.03); }
        .irow input { width: 100%; background: rgba(0,212,255,0.03); border: 1px solid var(--border); color: var(--text); padding: .7rem 1rem; outline: none; direction: ltr; }
        .btn { width: 100%; padding: .85rem; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Cinzel', serif; cursor: pointer; transition: .3s; margin-top: 1rem; }
        .btn:hover:not(:disabled) { background: var(--cyan); color: var(--bg); box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Status & Logs */
        .log { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: .8rem; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; }
        .ll { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 10px; }
        .info { color: var(--cyan); } .ok { color: var(--green); } .err { color: var(--orange); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">AXI<em>O</em>MARA</div>
    <div class="hdr"><div class="vbadge">v3.0</div><div class="dot"></div></div>
</header>

<div class="hero">
    <div class="eq"><span class="n">N</span> = <span class="g">g</span>(<span class="n">ID</span>, <span class="ts">Ts</span>)</div>
    <div class="hsub">Fractal Universal Kernel Transformation</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="sw('process')">⬡ معالجة ملف</div>
    <div class="tab" onclick="sw('compare')">⇌ مقارنة ملفين</div>
    <div class="tab" onclick="sw('log')">◎ السجل</div>
</div>

<div class="main">
    <div class="panel" style="animation-delay:.05s">
        <div class="plbl">رابط API</div>
        <div class="irow"><input type="text" id="api-url" placeholder="https://your-api-endpoint.com" value="https://wahed-backend-6-5glg.onrender.com"/></div>
    </div>

    <div class="page active" id="page-process">
        <div class="panel">
            <div class="plbl">رفع وتحليل الملف</div>
            <div class="uz" id="uz1" onclick="document.getElementById('fi1').click()">
                <p>اسحب الملف أو انقر هنا</p>
                <input type="file" id="fi1" hidden />
            </div>
            <div id="fb1" style="margin-top:10px; font-size:0.8rem; display:none;">
                <span id="fn1" style="color:var(--cyan)"></span> — <span id="fs1"></span>
            </div>
            <button class="btn" id="pb1" onclick="processFile()" disabled>⬡ بدء المعالجة</button>
        </div>
        
        <div class="panel" id="results-panel" style="display:none;">
            <div class="plbl">النتائج الفنية</div>
            <div id="res-content"></div>
            <button class="btn" style="border-color:var(--green); color:var(--green)" onclick="dlFile()">⬇ استعادة الملف</button>
        </div>
    </div>

    <div class="page" id="page-log">
        <div class="panel">
            <div class="plbl">سجل النظام</div>
            <div class="log" id="logp"></div>
        </div>
    </div>
</div>

<script>
    let currentFile = null;

    // التنقل بين التبويبات
    function sw(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // التعامل مع الملفات
    document.getElementById('fi1').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            currentFile = file;
            document.getElementById('fb1').style.display = 'block';
            document.getElementById('fn1').textContent = file.name;
            document.getElementById('fs1').textContent = (file.size / 1024).toFixed(2) + ' KB';
            document.getElementById('pb1').disabled = false;
            log(`تم تحميل: ${file.name}`, 'info');
        }
    });

    async function processFile() {
        const url = document.getElementById('api-url').value.trim();
        if(!url) return log("يرجى إدخال رابط الـ API", "err");

        log(`جاري معالجة ${currentFile.name}...`, "info");
        document.getElementById('pb1').disabled = true;

        const formData = new FormData();
        formData.append('file', currentFile);

        try {
            const response = await fetch(`${url}/process`, { method: 'POST', body: formData });
            const data = await response.json();
            
            document.getElementById('results-panel').style.display = 'block';
            log("اكتملت المعالجة بنجاح", "ok");
            // هنا يمكنك عرض البيانات في 'res-content'
        } catch (e) {
            log("خطأ في الاتصال بالخادم", "err");
        } finally {
            document.getElementById('pb1').disabled = false;
        }
    }

    function log(msg, type) {
        const logBox = document.getElementById('logp');
        const time = new Date().toLocaleTimeString('ar-SA');
        logBox.innerHTML += `<div class="ll"><span style="color:var(--dim)">${time}</span> <span class="${type}">${msg}</span></div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }
</script>
</body>
</html>
