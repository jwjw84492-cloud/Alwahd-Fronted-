‚Äè<!DOCTYPE html>
‚Äè<html lang="en">
‚Äè<head>
‚Äè    <meta charset="UTF-8">
‚Äè    <meta name="viewport" content="width=device-width, initial-scale=1.0">
‚Äè    <title>F-Lambda Transformer</title>
‚Äè    <style>
‚Äè        body {
‚Äè            font-family: Arial, sans-serif;
‚Äè            background: #0a0a0a;
‚Äè            color: #f0f0f0;
‚Äè            display: flex;
‚Äè            flex-direction: column;
‚Äè            align-items: center;
‚Äè            justify-content: center;
‚Äè            height: 100vh;
        }
‚Äè        input, button {
‚Äè            padding: 10px;
‚Äè            margin: 5px;
‚Äè            font-size: 1rem;
        }
‚Äè        .result {
‚Äè            margin-top: 20px;
‚Äè            word-break: break-all;
‚Äè            max-width: 80%;
        }
‚Äè    </style>
‚Äè</head>
‚Äè<body>
‚Äè    <h1>F-Lambda Transformer</h1>
‚Äè    <form id="uploadForm">
‚Äè        <input type="file" id="fileInput" required>
‚Äè        <button type="submit">Transform File</button>
‚Äè    </form>

‚Äè    <div class="result" id="result"></div>

‚Äè    <script>
‚Äè        const form = document.getElementById('uploadForm');
‚Äè        const fileInput = document.getElementById('fileInput');
‚Äè        const resultDiv = document.getElementById('result');

‚Äè        form.addEventListener('submit', async (e) => {
‚Äè            e.preventDefault();
‚Äè            resultDiv.textContent = "Processing...";

‚Äè            const file = fileInput.files[0];
‚Äè            if (!file) return;

‚Äè            const formData = new FormData();
‚Äè            formData.append('file', file);

‚Äè            try {
‚Äè                const response = await fetch("/upload", {
‚Äè                    method: "POST",
‚Äè                    body: formData
                });

‚Äè                if (!response.ok) throw new Error("Upload failed");

‚Äè                const data = await response.json();

‚Äè                resultDiv.innerHTML = `
‚Äè                    <strong>Filename:</strong> ${data.filename} <br>
‚Äè                    <strong>Content Type:</strong> ${data.content_type} <br>
‚Äè                    <strong>File Size:</strong> ${data.size_bytes} bytes <br>
‚Äè                    <strong>Signals Count:</strong> ${data.signals_count} <br>
‚Äè                    <strong>Processing Time:</strong> ${data.processing_time} <br>
‚Äè                    <strong>Base64 Preview (first 200 chars):</strong> <br>
‚Äè                    ${data.recovered_file.substring(0, 200)}...
                `;
‚Äè            } catch (err) {
‚Äè                resultDiv.textContent = "Error: " + err.message;
            }
        });
‚Äè    </script>
‚Äè</body>
‚Äè</html>
