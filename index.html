<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-Lambda Ultra | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); }
        .neon-border { border: 1px solid rgba(99, 102, 241, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [file, setFile] = useState(null);
            const [textInput, setTextInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [error, setError] = useState(null);
            
            // Using relative path for Flask
            const API_URL = "/process";

            useEffect(() => {
                const savedHistory = localStorage.getItem('f_lambda_history');
                if (savedHistory) setHistory(JSON.parse(savedHistory));
            }, []);

            useEffect(() => {
                localStorage.setItem('f_lambda_history', JSON.stringify(history));
            }, [history]);

            const addToHistory = (data) => {
                const newItem = {
                    id: Date.now(),
                    name: data.filename || "Deterministic Data",
                    type: data.content_type,
                    time: data.processing_time,
                    date: new Date().toLocaleTimeString()
                };
                setHistory(prev => [newItem, ...prev].slice(0, 10));
            };

            const processAction = async () => {
                setLoading(true);
                setError(null);
                setProgress(30);
                
                try {
                    let formData = new FormData();
                    if (file) {
                        formData.append('file', file);
                    } else if (textInput) {
                        const blob = new Blob([textInput], { type: 'text/plain' });
                        formData.append('file', new File([blob], "input.txt"));
                    } else {
                        throw new Error("Please provide input");
                    }

                    const response = await fetch(API_URL, { 
                        method: 'POST', 
                        body: formData 
                    });

                    if (!response.ok) throw new Error("Engine Error");
                    
                    const data = await response.json();
                    setResult(data);
                    addToHistory(data);
                    setProgress(100);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setTimeout(() => { setLoading(false); setProgress(0); }, 500);
                }
            };

            const safeDownload = () => {
                if (!result) return;
                const blob = new Blob([Uint8Array.from(atob(result.recovered_file), c => c.charCodeAt(0))], { type: result.content_type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Recovered_${result.filename}`;
                a.click();
            };

            return (
                <div className="min-h-screen p-4 md:p-12 max-w-7xl mx-auto">
                    {loading && <div className="fixed top-0 left-0 h-1 bg-indigo-500 z-50 transition-all" style={{width: `${progress}%`}}></div>}
                    
                    <header className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center font-bold">λ</div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase">F-Lambda <span className="text-indigo-500">PRO</span></h1>
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass neon-border p-6 rounded-3xl">
                                <textarea 
                                    value={textInput}
                                    onChange={(e) => {setTextInput(e.target.value); setFile(null);}}
                                    placeholder="Enter text here..."
                                    className="w-full h-32 bg-black/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none mb-4"
                                />
                                <div className="border-2 border-dashed border-slate-800 rounded-2xl p-6 text-center relative">
                                    <input type="file" onChange={(e) => setFile(e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    <p className="text-[10px] text-slate-400">{file ? file.name : "Upload Media File"}</p>
                                </div>
                                <button onClick={processAction} disabled={loading} className="w-full mt-4 bg-indigo-600 py-4 rounded-2xl font-bold">
                                    {loading ? "Processing..." : "Start Engine"}
                                </button>
                            </div>

                            <div className="glass neon-border p-6 rounded-3xl h-64 flex flex-col">
                                <h2 className="text-[10px] font-black text-slate-500 uppercase mb-4 flex justify-between">History <button onClick={() => setHistory([])} className="text-red-500">Clear</button></h2>
                                <div className="flex-grow overflow-y-auto custom-scrollbar space-y-2">
                                    {history.map(item => (
                                        <div key={item.id} className="p-3 bg-white/5 rounded-xl text-[10px]">
                                            <p className="font-bold truncate">{item.name}</p>
                                            <p className="text-slate-500 mt-1">{item.date} • {item.time}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            <div className="glass neon-border p-8 rounded-[2.5rem] min-h-[500px] flex flex-col">
                                {!result ? (
                                    <div className="flex-grow flex items-center justify-center text-slate-700 italic">Waiting for signal...</div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-black/60 rounded-3xl p-6 border border-slate-800">
                                            {result.content_type.startsWith('image') && <img src={`data:${result.content_type};base64,${result.recovered_file}`} className="max-h-80 mx-auto rounded-xl" />}
                                            {result.content_type.startsWith('video') && <video controls className="w-full max-h-80"><source src={`data:${result.content_type};base64,${result.recovered_file}`} type={result.content_type} /></video>}
                                            {result.content_type.startsWith('text') && <div className="p-4 font-mono text-emerald-500 text-xs break-all overflow-y-auto max-h-60">{atob(result.recovered_file)}</div>}
                                        </div>
                                        <button onClick={safeDownload} className="w-full bg-emerald-600 py-4 rounded-2xl font-black text-xs uppercase">Download Data</button>
                                    </div>
                                )}
                                {error && <div className="mt-4 p-4 bg-red-500/10 text-red-400 text-[10px] text-center">{error}</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
